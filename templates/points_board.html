<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Public Points Board | GUDLFT Registration</title>
</head>
<body>
    <h1>Public Points Board</h1>
    <p>This page is read-only and does not require login.</p>
    <table>
        <thead>
            <tr>
                <th>Club</th>
                <th>Available Points</th>
            </tr>
        </thead>
        <tbody>
            {% for club in clubs %}
            <tr>
                <td>{{ club['name'] }}</td>
                <td>{{ club['points'] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <p><a href="{{ url_for('index') }}">Back to Home</a></p>
</body>
</html>
